name: Publish VS Code Extension

on:
  push:
    tags:
      - 'v*'        # publish on version tags (recommended)
  # branches: [main]  # ...or use this instead, but bump version every release

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages (core, shared, arena, extension + webview)
        run: pnpm build

      - name: Publish extension
        working-directory: packages/vscode
        run: pnpm dlx @vscode/vsce publish --pre-release --no-dependencies -p ${{ secrets.VSCE_TOKEN }}
